<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>testing...</title>
</head>
<body>

  <div>
    <div v-for="item of 200" :key="item" class="rainflake"></div>
  </div>
<style>
.rainflake {
  --size: 2px;
  width: var(--size);
  height: var(--hsize);
  border-radius: 200% 200% 0 0;
  position: absolute;
  top: -5vh;
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0.1),
    rgba(255, 255, 255, 0.6)
  );
}

@keyframes rainfall {
  0% {
    transform: translate3d(var(--left-ini), 0, 0);
  }
  75% {
    transform: translate3d(var(--left-ini), 100vh, 0);
  }
  100% {
    transform: translate3d(var(--left-end), 100vh, 0);
  }
}

@for $i from 1 through 150 {
  .rainflake:nth-child(#{$i}) {
    --size: #{random(10) * 0.2}px;
    --hsize: #{random(3) * 12}px;
    --left-ini: #{random(20) - 10}vw;
    --left-end: #{random(20) - 10}vw;
    left: #{random(100)}vw;
    animation: rainfall #{0.5 + random(3)}s linear infinite;
    animation-delay: -#{random(10)}s;
  }
}

/* added small blur every 6 rainflakes*/
.rainflake:nth-child(6n) {
  filter: blur(1px);
}
</style>

</body>
</html>
